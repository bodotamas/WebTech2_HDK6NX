<app-search></app-search>
<app-tags></app-tags>

<app-not-found
  [visible]="!foods || !foods.length"
  resetLinkText="Reset Search">
</app-not-found>

<ul class="food-list">
  <li *ngFor="let food of foods" class="food-item">
    <a routerLink="/food/{{food.id}}" class="food-card">
      <div class="image-wrapper">
        <img [src]="food.imageUrl" [alt]="food.name" />
      </div>

      <div class="content">
        <div class="top-row">
          <div class="name">
            {{food.name}}
          </div>

          <span class="favorite {{food.favorite ? '' : 'not'}}">
            ❤
          </span>
        </div>

        <div class="stars">
          <star-rating [stars]="food.stars"></star-rating>
        </div>

        <div class="product-item-footer">
          <div class="origins">
            <span *ngFor="let origin of food.origins" class="origin-badge">
              {{origin}}
            </span>
          </div>

          <div class="cook-time">
            <span>🕒</span>
            {{food.cookTime}} min
          </div>
        </div>

        <div class="price">
          <span>
            {{food.price | currency}}
          </span>
        </div>
      </div>
    </a>
  </li>
</ul>
