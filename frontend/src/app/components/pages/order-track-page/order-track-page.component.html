<div class="container">
  <div class="content" *ngIf="order">
    <div class="order-card">
      <h1>Order #{{order.id}}</h1>

      <div class="details">
        <div class="detail-row">
          <strong>Date</strong>
          <span>{{order.createdAt | date:'medium'}}</span>
        </div>

        <div class="detail-row">
          <strong>Name</strong>
          <span>{{order.name}}</span>
        </div>

        <div class="detail-row">
          <strong>Address</strong>
          <span>{{order.address}}</span>
        </div>

        <div class="detail-row">
          <strong>Status</strong>
          <span class="status-badge">{{order.status}}</span>
        </div>

        <div class="detail-row" *ngIf="order.paymentId">
          <strong>Payment ID</strong>
          <span>{{order.paymentId}}</span>
        </div>
      </div>
    </div>

    <div class="items-card">
      <order-items-list [order]="order"></order-items-list>
    </div>
  </div>

  <div class="map-section">
    <div class="map-card">
      <app-title title="Shipping Address"></app-title>
      <map [order]="order" [readonly]="true"></map>
    </div>
  </div>
</div>
