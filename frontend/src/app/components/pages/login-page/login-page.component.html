<div class="container">
  <div class="details">
    <div class="login-card">
      <app-title title="Login"></app-title>

      <form [formGroup]="loginForm" (ngSubmit)="submit()" class="login-form">
        <text-input
          [control]="fc.email"
          [showErrorsWhen]="isSubmitted"
          type="email"
          label="Email">
        </text-input>

        <text-input
          [control]="fc.password"
          [showErrorsWhen]="isSubmitted"
          type="password"
          label="Password">
        </text-input>

        <div class="button-wrapper">
          <default-button text="Login"></default-button>
        </div>

        <div class="register">
          <span>New user?</span>
          <a routerLink="/register" [queryParams]="{returnUrl : returnUrl}">
            Register here
          </a>
        </div>
      </form>
    </div>
  </div>
</div>
