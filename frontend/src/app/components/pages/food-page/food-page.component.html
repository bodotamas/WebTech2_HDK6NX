<app-not-found 
  [visible]="!food"
  notFoundMessage="Food not found!" 
  resetLinkText="Back To Homepage">
</app-not-found>

<div *ngIf="food" class="container">
  <div class="image-card">
    <img [src]="food.imageUrl" [alt]="food.name" />
  </div>

  <div class="details">
    <div class="header">
      <div class="title-group">
        <span class="name">
          {{food.name}}
        </span>
      </div>

      <span class="favorite {{food.favorite ? '' : 'not'}}">❤</span>
    </div>

    <div class="rating">
      <star-rating [stars]="food.stars" [size]="1.8"></star-rating>
    </div>

    <div class="origins">
      <span *ngFor="let origin of food.origins" class="origin-badge">
        {{origin}}
      </span>
    </div>

    <div class="tags">
      <a *ngFor="let tag of food.tags" routerLink="/tag/{{tag}}" class="tag-badge">
        {{tag}}
      </a>
    </div>

    <div class="cook-time">
      <span>
        Time to cook about <strong>{{food.cookTime}}</strong> minutes
      </span>
    </div>

    <div class="price">
      <span>{{food.price | currency}}</span>
    </div>

    <button class="add-to-cart-button" (click)="addToCart()">
      Add To Cart
    </button>
  </div>
</div>
