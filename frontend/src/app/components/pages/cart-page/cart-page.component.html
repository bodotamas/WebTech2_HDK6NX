<app-title title="Cart Page" margin="1.5rem 0 0 2.5rem"></app-title>

<app-not-found
  [visible]="!cart || !cart.items.length"
  notFoundMessage="Cart Page Is Empty!"
  resetLinkText="Go To Homepage"
></app-not-found>

<div *ngIf="cart && cart.items.length" class="container">
  <ul class="cart-list">
    <li *ngFor="let cartItem of cart.items" class="cart-item">
      <div class="image-container">
        <img [src]="cartItem.food.imageUrl" [alt]="cartItem.food.name">
      </div>

      <div class="food-info">
        <a routerLink="/food/{{cartItem.food.id}}" class="food-name">
          {{cartItem.food.name}}
        </a>
      </div>

      <div class="quantity-box">
        <label class="quantity-label">Qty</label>
        <select
          #quantitySelect
          class="quantity-select"
          [value]="cartItem.quantity"
          (change)="changeQuantity(cartItem, quantitySelect.value)"
        >
          <option>1</option>
          <option>2</option>
          <option>3</option>
          <option>4</option>
          <option>5</option>
        </select>
      </div>

      <div class="price-box">
        {{cartItem.price | currency}}
      </div>

      <div class="action-box">
        <button class="remove-button" (click)="removeFromCart(cartItem)">
          Remove
        </button>
      </div>
    </li>
  </ul>

  <div class="checkout">
    <div class="summary">
      <div class="foods-count">{{cart.totalCount}}</div>
      <div class="total-price">{{cart.totalPrice | currency}}</div>
    </div>

    <a routerLink="/checkout" class="checkout-button">Proceed to Checkout</a>
  </div>
</div>
